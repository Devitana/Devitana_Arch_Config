##################################
### NVIDIA OPTIMIZATION        ###
##################################

# GBM backend for NVIDIA (required for Wayland)
env = GBM_BACKEND,nvidia-drm

# Use NVIDIA as the GLX vendor
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# Vulkan ICD for NVIDIA
env = VK_ICD_FILENAMES,/usr/share/vulkan/icd.d/nvidia_icd.x86_64.json

# Use Vulkan renderer
env = WLR_RENDERER,vulkan

# Hardware cursor workaround (required on many NVIDIA setups)
env = WLR_NO_HARDWARE_CURSORS,1

# WSI present mode — fifo (vsync) is the safest choice for NVIDIA
env = MESA_VK_WSI_PRESENT_MODE,fifo

# VRR / Adaptive Sync (NVIDIA G-Sync)
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1
