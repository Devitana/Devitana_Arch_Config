##################################
### GENERIC WAYLAND FALLBACK    ###
##################################

# Used when no specific GPU is detected.
# Provides safe defaults for any Wayland-capable GPU.

env = WLR_RENDERER,vulkan
env = WLR_NO_HARDWARE_CURSORS,1

# VRR / Adaptive Sync (enable if your display supports it)
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1

# Default present mode (mailbox = low-latency, fifo = vsync-safe)
env = MESA_VK_WSI_PRESENT_MODE,mailbox
