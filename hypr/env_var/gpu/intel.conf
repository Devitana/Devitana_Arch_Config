##################################
### INTEL GPU OPTIMIZATION     ###
##################################

# Use Vulkan renderer (Mesa ANV driver)
env = WLR_RENDERER,vulkan

# Hardware cursors work natively with Mesa
env = WLR_NO_HARDWARE_CURSORS,0

# Vulkan ICD for Intel (ANV = Anvil Vulkan driver)
env = VK_ICD_FILENAMES,/usr/share/vulkan/icd.d/intel_icd.x86_64.json

# WSI present mode (mailbox = low-latency, fifo = vsync)
env = MESA_VK_WSI_PRESENT_MODE,mailbox
