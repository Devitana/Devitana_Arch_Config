##################################
### INTEL GPU OPTIMIZATION      ###
##################################

# Wayland rendering
env = WLR_RENDERER,vulkan
env = WLR_NO_HARDWARE_CURSORS,1

# Intel Vulkan ICD (iris driver for Gen8+ / UHD / Arc)
env = VK_ICD_FILENAMES,/usr/share/vulkan/icd.d/intel_icd.x86_64.json

# Force Mesa iris driver (Gen8+); swap to i965 for older hardware
env = MESA_LOADER_DRIVER_OVERRIDE,iris

# VRR / Adaptive Sync
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1

# Present mode (mailbox gives lower latency on Intel)
env = MESA_VK_WSI_PRESENT_MODE,mailbox

